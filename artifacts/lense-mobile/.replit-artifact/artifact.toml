kind = "mobile"
previewPath = "/"
title = "AthleteAI Mobile"
version = "1.0.0"
id = "artifacts/lense-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24284

[services.development]
run = "pnpm --filter @workspace/lense-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lense-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/lense-mobile", "run", "serve" ]

[services.env]
PORT = "24284"
BASE_PATH = "/"
