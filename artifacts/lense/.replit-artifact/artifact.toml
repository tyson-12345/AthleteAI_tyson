kind = "web"
previewPath = "/"
title = "AthleteAI"
version = "1.0.0"
id = "artifacts/lense"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26119

[services.development]
run = "pnpm --filter @workspace/lense run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lense", "run", "build" ]
publicDir = "artifacts/lense/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26119"
BASE_PATH = "/"
